[platformio]
default_envs = T_Embed_CC1101_XC60_TPMS

[env:T_Embed_CC1101_XC60_TPMS]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino

; T-Embed-CC1101 is ESP32-S3 with 16MB flash / PSRAM.
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio

upload_speed = 460800
; If upload still fails on a particular USB cable/port, use 115200 temporarily.
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

lib_ldf_mode = deep+

lib_deps =
  jgromes/RadioLib@6.5.0
  bodmer/TFT_eSPI@^2.5.43
  bblanchon/ArduinoJson@^7.0.4
  thijse/ArduinoLog@^1.1.1
  https://github.com/NorthernMan54/rtl_433_ESP.git

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=3

  ; Project identity
  -DXC60_TPMS_TEMBED_CC1101=1
  -DPROJECT_VERSION=\"TEmbedCC1101-2026-05-10-E-FINAL-UI-CACHE\"

  ; TFT_eSPI / ST7789 1.9 inch 320x170 on LILYGO T-Embed-CC1101
  -DUSER_SETUP_LOADED=1
  -DST7789_DRIVER=1
  -DTFT_WIDTH=170
  -DTFT_HEIGHT=320
  -DTFT_MISO=10
  -DTFT_MOSI=9
  -DTFT_SCLK=11
  -DTFT_CS=41
  -DTFT_DC=16
  -DTFT_RST=40
  -DTFT_BL=21
  -DTFT_BACKLIGHT_ON=HIGH
  -DTFT_RGB_ORDER=TFT_BGR
  -DTFT_INVERSION_ON=1
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=16000000
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DLOAD_FONT6=1
  -DLOAD_FONT7=1
  -DLOAD_FONT8=1
  -DSMOOTH_FONT=1

  ; rtl_433_ESP / CC1101 FSK receiver for Abarth-124Spider TPMS
  -DRF_CC1101=\"CC1101\"
  -DRF_MODULE_FREQUENCY=433.92
  -DOOK_MODULATION=false
  -DRF_MODULE_CS=12
  -DRF_MODULE_GDO0=3
  -DRF_MODULE_GDO2=38
  -DRF_MODULE_SCK=11
  -DRF_MODULE_MISO=10
  -DRF_MODULE_MOSI=9
  -DRF_MODULE_INIT_STATUS=false
  -DSIGNAL_RSSI=true
  ; Final daily-use build: protocol registration was already verified in REGISTER-CHECK.
  ; Keep the receiver quiet for car use; this does not change FSK/Abarth decode logic.
  -DRTL_DEBUG=0
  -DRSSI_THRESHOLD=14
  -DRSSI_SAMPLES=50000
  -DMINRSSI=-82

; Alternate environment: use GDO2 as the rtl_433 receive pin.
; Use only if the default environment starts but total/model/mine remain 0 in real car testing.
[env:T_Embed_CC1101_XC60_TPMS_GDO2_RX]
extends = env:T_Embed_CC1101_XC60_TPMS
build_flags =
  ${env:T_Embed_CC1101_XC60_TPMS.build_flags}
  -DXC60_FORCE_RX_GDO2=1
